# YOLO-OBB 训练配置

# 数据集配置
data:
  dataset_name: DOTA
  # data.yaml 路径与 prepare_dota.py 的 OUTPUT_DIR 一致
  dataset_yaml: /data/fcj/output/data.yaml

  # 类别定义（顺序与 prepare_dota.py CATEGORY_MAP 一致）
  names:
    - plane
    - ship
    - storage-tank
    - baseball-diamond
    - tennis-court
    - basketball-court
    - ground-track-field
    - harbor
    - bridge
    - large-vehicle
    - small-vehicle
    - helicopter
    - roundabout
    - soccer-ball-field
    - swimming-pool
  nc: 15

# 模型配置
model:
  architecture: yolov8n-obb
  pretrained: true
  backbone: c2f

# 训练超参数
train:
  # 基础参数
  imgsz: 1024
  batch_size: 16
  epochs: 100
  device: 0

  # 优化器
  optimizer: SGD
  lr0: 0.01
  lrf: 0.1
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8

  # 数据增强
  augment:
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    rotation: 90
    scale: 0.5
    translate: 0.1
    mosaic: 1.0
    mixup: 0.0

  # Loss 系数
  box: 7.5
  cls: 0.5
  dfl: 1.5

  # 其他
  amp: true
  patience: 50
  save_period: 10

# 验证配置
val:
  batch_size: 16
  imgsz: 1024
  save_json: false
  save_hybrid: false

  iou_thres: 0.5
  conf_thres: 0.001
  iou_thres_nms: 0.7

  target_mAP50: 0.80
  target_precision: 0.90

# 检查点配置
checkpoint:
  save_dir: ./models/training/runs
  project: DOTA_OBB
  name: train
  exist_ok: false
  resume: false