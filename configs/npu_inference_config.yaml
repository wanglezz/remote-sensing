# NPU 推理配置

# 模型配置
model:
  om_path: ./models/om_models/yolov8n_obb.om
  input_shape: [1, 3, 1024, 1024]  # NCHW
  input_name: images

# 昇腾 NPU 配置
npu:
  device_id: 0
  aipp_mode: static  # AIPP 模式：static/none
  insert_aipp: true  # 是否插入 AIPP

  # AIPP 参数 (图像预处理)
  aipp:
    source_format: RGBU8
    output_format: RGBU8
    csc_switch: false
    rgb_cube_enable: false
    # 归一化：(pixel - mean) / std
    mean_chnl_0: 0.0
    mean_chnl_1: 0.0
    mean_chnl_2: 0.0
    min_chnl_0: 0.0
    min_chnl_1: 0.0
    min_chnl_2: 0.0
    var_reci_chnl_0: 0.0039215686  # 1/255
    var_reci_chnl_1: 0.0039215686
    var_reci_chnl_2: 0.0039215686

# 推理配置
inference:
  batch_size: 1
  conf_thres: 0.25  # 置信度阈值
  iou_thres: 0.7    # NMS IoU 阈值
  max_det: 300      # 最大检测框数
  imgsz: 1024       # 推理尺寸

  # 后处理
  postprocess:
    rotate_nms: true
    multi_label: false

# 性能配置
performance:
  benchmark: true
  warmup_iters: 10
  test_iters: 100
  target_latency_ms: 20  # 目标时延 ≤20ms
